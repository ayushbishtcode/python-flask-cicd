name: Python CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: python-flask-cicd

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            -v

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Print GitHub Context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Inspect OIDC Token Claims
        shell: bash
        run: |
          TOKEN_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")

          TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['value'])")

          python3 - "$TOKEN" <<'PY'
          import base64
          import json
          import sys

          token = sys.argv[1]

          payload = token.split('.')[1]
          payload += '=' * (-len(payload) % 4)

          claims = json.loads(base64.urlsafe_b64decode(payload))

          print("========== OIDC CLAIMS ==========")
          print("sub:", claims.get("sub"))
          print("aud:", claims.get("aud"))
          print("repository:", claims.get("repository"))
          print("repository_owner:", claims.get("repository_owner"))
          print("ref:", claims.get("ref"))
          print("event_name:", claims.get("event_name"))
          print("workflow:", claims.get("workflow"))
          PY

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::374894298799:role/GitHubActions-ECR-Role
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:latest .

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
